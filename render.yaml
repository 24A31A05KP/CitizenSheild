services:
  - type: web
    name: secureshe-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_HOST
        fromDatabase:
          name: secureshe-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: secureshe-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: secureshe-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: secureshe-db
          property: database
      - key: DB_PORT
        value: 3306
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.com

databases:
  - name: secureshe-db
    databaseName: secureshe_db
    user: secureshe_user
    plan: free