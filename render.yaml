services:
  - type: web
    name: secureshe-backend
    runtime: python
    repo: https://github.com/24A31A05KP/SecureShe
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DB_HOST
        value: gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      - key: DB_USER
        value: 3Y4R2Ha3Vvvx6Zf.root
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: secureshe_db
      - key: DB_PORT
        value: 4000
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SSL_CA_PATH
        value: /etc/secrets/isrgrootx1.pem